services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  gateway:
    build: .
    volumes: [".:/app"]
    command: python -u gateway.py
    environment: &rab-env
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    depends_on: [rabbitmq]

  borrowing-service:
    build: .
    volumes: [".:/app"]
    command: python -u borrowing.py
    environment: *rab-env
    depends_on: [rabbitmq]

  catalog-service:
    build: .
    volumes: [".:/app"]
    command: python -u catalog.py
    environment: *rab-env
    depends_on: [rabbitmq]

  notification-service:
    build: .
    volumes: [".:/app"]
    command: python -u notifications.py
    environment: *rab-env
    depends_on: [rabbitmq]

